<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annonces — MaisonFacile</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">🏠 MaisonFacile</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Accueil</a>
      <a href="annonces.html" class="nav-link active">Annonces</a>
      <a href="publier.html" class="nav-btn">Publier une annonce</a>
    </div>
    <button class="burger" id="burger" aria-label="Menu">☰</button>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Accueil</a>
    <a href="annonces.html">Annonces</a>
    <a href="publier.html">Publier une annonce</a>
  </div>
</nav>

<div class="annonces-page">
  <!-- FILTRES -->
  <aside class="filters-panel">
    <h3>Filtres</h3>
    <div class="filter-group">
      <label>Pays</label>
      <select id="fPays" onchange="filtrerAnnonces()">
        <option value="">Tous</option>
        <option value="Congo">🇨🇬 Congo</option>
        <option value="Gabon">🇬🇦 Gabon</option>
        <option value="Cameroun">🇨🇲 Cameroun</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Ville</label>
      <input type="text" id="fVille" placeholder="ex: Brazzaville" oninput="filtrerAnnonces()">
    </div>
    <div class="filter-group">
      <label>Type de logement</label>
      <select id="fType" onchange="filtrerAnnonces()">
        <option value="">Tous</option>
        <option value="studio">Studio / Chambre</option>
        <option value="2p">2 Chambres salon</option>
        <option value="villa">Villa / Plus grand</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Prix max (F CFA / mois)</label>
      <input type="number" id="fPrix" placeholder="ex: 100000" oninput="filtrerAnnonces()">
    </div>
    <button class="reset-btn" onclick="resetFiltres()">Réinitialiser</button>
    <div id="map2" class="map-sidebar"></div>
  </aside>

  <!-- LISTE -->
  <main class="annonces-main">
    <div class="annonces-toolbar">
      <span id="countResult">Chargement...</span>
      <select id="sortSelect" onchange="filtrerAnnonces()">
        <option value="recent">Plus récents</option>
        <option value="prix_asc">Prix croissant</option>
        <option value="prix_desc">Prix décroissant</option>
      </select>
    </div>
    <div class="cards-grid" id="annoncesGrid"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <p>Aucune annonce trouvée pour ces critères.</p>
      <button onclick="resetFiltres()">Voir toutes les annonces</button>
    </div>
  </main>
</div>

<footer class="footer">
  <div class="container footer-inner">
    <span class="logo">🏠 MaisonFacile</span>
    <span class="footer-copy">© 2025 — Congo · Gabon · Cameroun</span>
  </div>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
